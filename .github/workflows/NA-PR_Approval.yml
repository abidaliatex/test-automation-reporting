name: Auto-merge Copilot PRs

on:
  pull_request_target:
    #types: [opened, ready_for_review]

jobs:
  auto-merge:
    if: |
      github.actor == 'copilot-swe-agent[bot]' ||
      github.actor == 'github-copilot[bot]' ||
      github.actor == 'Copilot'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Convert Draft to Ready
        if: github.event.pull_request.draft == true
        run: |
          echo "Converting draft to ready..."
          gh pr ready ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for Requested Changes
        run: |
          STATUS=$(gh pr view "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --json reviewDecision,mergeable \
            --jq '"\(.reviewDecision) \(.mergeable)"')
          echo "PR status: $STATUS"
          if echo "$STATUS" | grep -q "CHANGES_REQUESTED"; then
            echo "Changes requested — skipping auto-merge."
            exit 1
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Squash-merge PR
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --squash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
