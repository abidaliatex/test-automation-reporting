name: Auto-merge Copilot PRs

on:
  schedule:
    - cron: '*/5 * * * *'  # runs every 5 minutes
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge all open draft PRs
        run: |
          echo "🔍 Looking for open draft PRs..."

          # Get ALL open draft PRs (no author filter — avoids login mismatch)
          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,isDraft \
            --jq '[.[] | select(.isDraft == true)] | .[].number')

          if [ -z "$PRS" ]; then
            echo "✅ No open draft PRs found."
            exit 0
          fi

          echo "Found draft PRs: $PRS"

          for PR in $PRS; do
            echo "⚙️  Processing PR #$PR..."

            # Convert draft to ready
            echo "Converting PR #$PR from draft to ready..."
            gh pr ready "$PR" --repo "${{ github.repository }}"

            # Check for requested changes
            STATUS=$(gh pr view "$PR" \
              --repo "${{ github.repository }}" \
              --json reviewDecision \
              --jq '.reviewDecision')

            if [ "$STATUS" == "CHANGES_REQUESTED" ]; then
              echo "⏭️  PR #$PR has changes requested — skipping."
              continue
            fi

            # Merge the PR
            echo "✅ Merging PR #$PR..."
            gh pr merge "$PR" \
              --repo "${{ github.repository }}" \
              --squash

            echo "🎉 PR #$PR merged!"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
