name: Auto-merge Copilot PRs

on:
  schedule:
    - cron: '*/5 * * * *'  # runs every 5 minutes

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Find and merge open Copilot draft PRs
        run: |
          # Get all open PRs by Copilot bot
          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --json number,isDraft,author \
            --jq '[.[] | select(
              .author.login == "copilot-swe-agent[bot]" or
              .author.login == "github-copilot[bot]" or
              .author.login == "Copilot"
            )] | .[].number')

          if [ -z "$PRS" ]; then
            echo "No Copilot PRs found."
            exit 0
          fi

          for PR in $PRS; do
            echo "Processing PR #$PR..."

            # Convert draft to ready if needed
            IS_DRAFT=$(gh pr view "$PR" \
              --repo "${{ github.repository }}" \
              --json isDraft --jq '.isDraft')

            if [ "$IS_DRAFT" == "true" ]; then
              echo "Converting PR #$PR from draft to ready..."
              gh pr ready "$PR" --repo "${{ github.repository }}"
            fi

            # Check for requested changes
            STATUS=$(gh pr view "$PR" \
              --repo "${{ github.repository }}" \
              --json reviewDecision \
              --jq '.reviewDecision')

            if [ "$STATUS" == "CHANGES_REQUESTED" ]; then
              echo "PR #$PR has changes requested — skipping."
              continue
            fi

            # Merge the PR
            echo "Merging PR #$PR..."
            gh pr merge "$PR" \
              --repo "${{ github.repository }}" \
              --squash
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
